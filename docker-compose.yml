# Yumegoji — PostgreSQL (Supabase-compatible) + tự init DB + API (.NET 8)
#
# Lần đầu (từ thư mục gốc repo):
#   copy .env.example .env   (tuỳ chọn — có giá trị mặc định)
#   docker compose up -d --build
#
# API:     http://localhost:5056/swagger
# Postgres: localhost:5433  (yumegoji / POSTGRES_PASSWORD)
# Tắt:     docker compose down
# Xoá DB:  docker compose down -v

services:
  postgres:
    image: postgres:16-alpine
    container_name: yumegoji-postgres
    hostname: yumegoji-postgres
    environment:
      POSTGRES_USER: yumegoji
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-Yumegoji_Pg_2024!}
      POSTGRES_DB: yumegoji
    ports:
      - "5433:5432"
    volumes:
      - yumegoji_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yumegoji -d yumegoji"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  db-init:
    build:
      context: ./docker/sql-init
      dockerfile: Dockerfile
    container_name: yumegoji-db-init
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGHOST: yumegoji-postgres
      PGUSER: yumegoji
      PGPASSWORD: ${POSTGRES_PASSWORD:-Yumegoji_Pg_2024!}
      PGDATABASE: yumegoji
      SQL_DIR: /sql
    volumes:
      - ./backend/doc/sql:/sql:ro
    restart: "no"

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: yumegoji-api
    depends_on:
      db-init:
        condition: service_completed_successfully
    ports:
      - "${API_HOST_PORT:-5056}:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      ConnectionStrings__DefaultConnection: Host=yumegoji-postgres;Port=5432;Database=yumegoji;Username=yumegoji;Password=${POSTGRES_PASSWORD:-Yumegoji_Pg_2024!};
      Jwt__Key: ${JWT_KEY:-change-this-docker-jwt-key-minimum-32-characters-long}
      Frontend__PublicBaseUrl: http://localhost:8080
    volumes:
      - yumegoji_uploads:/app/wwwroot/uploads
    restart: unless-stopped

volumes:
  yumegoji_pg_data:
  yumegoji_uploads:
